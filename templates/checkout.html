<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Checkout</h1>
        <div style="display: flex; gap: 40px;">
            <div style="flex: 1;">
                <h2>Order Summary</h2>
                {% for item in cart_items %}
                <div style="display: flex; gap: 20px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px;">
                    <img src="{{ item.image }}" alt="{{ item.name }}" style="width: 80px; height: 60px; object-fit: cover; border-radius: 5px;">
                    <div>
                        <span style="font-weight: 600;">{{ item.name }}</span><br>
                        <span>{{ item.price }}</span>
                    </div>
                </div>
                {% endfor %}
                <div style="display: flex; justify-content: space-between; padding: 15px 0; font-weight: bold; font-size: 18px;">
                    <span>Total:</span>
                    <span>{{ total }}</span>
                </div>
            </div>
            <div style="flex: 1;">
                <h2>Shipping Information</h2>
                <form method="GET" action="{{ url_for('payment') }}">
                    <input type="text" name="name" placeholder="Full Name" required style="width: 100%; margin-bottom: 10px;">
                    <input type="email" name="email" placeholder="Email" required style="width: 100%; margin-bottom: 10px;">
                    <input type="text" name="address" placeholder="Address" required style="width: 100%; margin-bottom: 10px;">
                    <input type="text" name="city" placeholder="City" required style="width: 100%; margin-bottom: 10px;">
                    <input type="text" name="zip" placeholder="ZIP Code" required style="width: 100%; margin-bottom: 20px;">
                    <button type="submit" style="width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 18px;">Proceed to Payment</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
