<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacBook Lineup</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🌈 DYNAMIC BACKGROUND */
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
color:#1d1d1f;
background:linear-gradient(-45deg,#f5f5f7,#e6ecff,#fdfdfd,#eef1ff);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
min-height:100vh
}
@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:#ffffffee;
backdrop-filter:blur(10px);
border-bottom:1px solid #ddd;
padding:16px 30px;
z-index:1000
}
header h1{font-size:22px;font-weight:600}

/* HERO */
.hero{
margin-top:90px;
text-align:center;
padding:40px 20px
}
.hero h2{font-size:42px;font-weight:700}
.hero p{color:#555;margin-top:8px}

/* GRID */
.container{
max-width:1400px;
margin:auto;
padding:20px
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px
}

/* CARD */
.card{
background:#ffffff;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,0.12);
overflow:hidden;
transition:transform .3s
}
.card:hover{transform:translateY(-6px)}

/* IMAGE SLIDER */
.slider{
height:220px;
background:#fafafa
}
.slider img{
width:100%;
height:220px;
object-fit:contain;
display:none
}
.slider img.active{display:block}

/* INFO */
.info{padding:18px}
.info h3{font-size:20px}
.info p{color:#666;margin:6px 0}

.badge{
display:inline-block;
background:#eef0f4;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin:3px
}

.footer{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
padding-top:15px;
border-top:1px solid #eee
}

.price{
font-size:20px;
font-weight:600;
color:#0071e3
}

button{
background:#0071e3;
color:#fff;
border:none;
padding:8px 18px;
border-radius:20px;
cursor:pointer
}
</style>
</head>

<body>

<header>
<h1>MacBook Store</h1>
</header>

<section class="hero">
<h2>MacBook Lineup</h2>
<p>M5 to M1 — compare performance and price</p>
</section>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<script>
const products=[
{
name:"MacBook Air M5",
price:"₹2,99,999",
desc:"Extreme performance",
specs:["M5","48GB RAM","2TB SSD"],
images:[
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/mbp16-spacegray-select-202301.jpg",
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/mbp16-silver-select-202301.jpg"
]
},
{
name:"MacBook Air M4",
price:"₹1,50,999",
desc:"Powerful and efficient",
specs:["M4","24GB RAM","1TB SSD"],
images:[
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/mbp14-spacegray-select-202301.jpg",
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/mbp14-silver-select-202301.jpg"
]
},
{
name:"MacBook Air M3",
price:"₹1,00,000",
desc:"Thin and fast",
specs:["M3","16GB RAM","512GB SSD"],
images:[
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-air-13-m3-midnight-select-202403.jpg",
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-air-13-m3-starlight-select-202403.jpg"
]
},
{
name:"MacBook Air M2",
price:"₹80,000",
desc:"Best value",
specs:["M2","8GB RAM","256GB SSD"],
images:[
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-air-13-midnight-select-202206.jpg",
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-air-13-starlight-select-202206.jpg"
]
},
{
name:"MacBook Air M1",
price:"₹60,000",
desc:"Reliable choice",
specs:["M1","8GB RAM","256GB SSD"],
images:[
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-air-space-gray-select-201810.jpg",
"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-air-gold-select-201810.jpg"
]
}
];

const grid=document.getElementById("grid");

products.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card">
<div class="slider" id="slider${i}">
${p.images.map((img,j)=>`<img src="${img}" class="${j===0?'active':''}">`).join("")}
</div>
<div class="info">
<h3>${p.name}</h3>
<p>${p.desc}</p>
${p.specs.map(s=>`<span class="badge">${s}</span>`).join("")}
<div class="footer">
<div class="price">${p.price}</div>
<button>Buy</button>
</div>
</div>
</div>`;
});

/* SLIDER */
setInterval(()=>{
products.forEach((_,i)=>{
const imgs=document.querySelectorAll(`#slider${i} img`);
let idx=[...imgs].findIndex(img=>img.classList.contains("active"));
imgs[idx].classList.remove("active");
imgs[(idx+1)%imgs.length].classList.add("active");
});
},3000);
</script>

</body>
</html>
